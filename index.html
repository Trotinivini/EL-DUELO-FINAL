<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador Regresivo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
    min-height: 100dvh;
    width: 100%;
    font-family: Arial, sans-serif;

    background: 
      url('image.png') center / contain no-repeat,
      linear-gradient(135deg, #1a1a1a, #3d0000);

    background-attachment: fixed; 
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

    .contador-container {
      background: linear-gradient(135deg, #1a1a1a, #3d0000);
      border: 2px solid #ff4500;
      padding: 50px 50px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      min-width: 100px;
      position: relative;
      z-index: 1;
      margin-top: 150px;
    }

    .contador-container {
      transform: scale(0.5);
    }

    .titulo {
      font-family: 'Montserrat', Arial, sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: white;
      margin-bottom: 30px;
      margin-top: -20px;
      text-align: center;
      letter-spacing: -4px;
    }

    .contador {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .grupo {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .digitos {
      display: flex;
      gap: 6px;
    }

    .bloque {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      padding: 12px 10px;
      font-size: 30px;
      font-weight: bold;
      color: #555555;
      min-width: 32px;
      text-align: center;
    }

    .label {
      margin-top: 8px;
      font-size: 14px;
      color: white;
      text-transform: lowercase;
    }

    .separador {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
      height: 0px;
      line-height: 10px;
      padding: 0 0px;
      margin-top: -25px;
    }

    @keyframes vibrar {
      0%   { transform: translate(0, 0); }
      20%  { transform: translate(-1px, 1px); }
      40%  { transform: translate(1px, -1px); }
      60%  { transform: translate(-1px, 1px); }
      80%  { transform: translate(1px, -1px); }
      100% { transform: translate(0, 0); }
    }

    .temblor {
      animation: vibrar 0.05s infinite;
    }

    .explosion-circle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, #ff00ff, #800080);
      pointer-events: none;
      opacity: 1;
      z-index: 2;
      transform-origin: center center;
      animation: explosion-expand 0.7s forwards;
    }

    @keyframes explosion-expand {
      0%   { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(10);  opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="contador-container">
    <div class="titulo">E LㅤD U E L OㅤF I N A L</div>
    <div class="contador" id="contador"></div>
  </div>

  <script>
    const fechaObjetivo = new Date("2026-04-29T22:00:00");

    function formatearDigitos(numero) {
      return String(numero).padStart(2, '0').split('');
    }

    function crearGrupo(valor, etiqueta) {
      const grupo = document.createElement("div");
      grupo.className = "grupo";

      const digitos = document.createElement("div");
      digitos.className = "digitos";
      valor.forEach(d => {
        const bloque = document.createElement("div");
        bloque.className = "bloque";
        bloque.textContent = d;
        digitos.appendChild(bloque);
      });

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = etiqueta;

      grupo.appendChild(digitos);
      grupo.appendChild(label);
      return grupo;
    }

    function renderGrupos(horas, minutos, segundos) {
      const container = document.getElementById("contador");
      container.innerHTML = "";

      const grupos = [
        { valor: formatearDigitos(horas),    label: "horas" },
        { valor: formatearDigitos(minutos),  label: "minutos" },
        { valor: formatearDigitos(segundos), label: "segundos" }
      ];

      grupos.forEach((g, i) => {
        container.appendChild(crearGrupo(g.valor, g.label));
        if (i < grupos.length - 1) {
          const sep = document.createElement("div");
          sep.className = "separador";
          sep.textContent = ":";
          container.appendChild(sep);
        }
      });
    }

    let efectoIniciado = false;

    function actualizarContador() {
      const diferencia = fechaObjetivo - new Date();

      if (diferencia <= 0) {
        renderGrupos(0, 0, 0);
        clearInterval(intervalo);

        if (!efectoIniciado) {
          efectoIniciado = true;
          iniciarEfecto();
        }
        return;
      }

      const segundos = Math.floor((diferencia / 1000) % 60);
      const minutos  = Math.floor((diferencia / 1000 / 60) % 60);
      const horas    = Math.floor(diferencia / (1000 * 60 * 60));
      renderGrupos(horas, minutos, segundos);
    }

    function iniciarEfecto() {
      const container = document.querySelector(".contador-container");

      container.classList.add("temblor");

      setTimeout(() => {
        container.classList.remove("temblor");

        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const explosion = document.createElement("div");
        explosion.className = "explosion-circle";
        explosion.style.width  = "100px";
        explosion.style.height = "100px";
        explosion.style.left   = (centerX - 50) + "px";
        explosion.style.top    = (centerY - 50) + "px";
        document.body.appendChild(explosion);

        explosion.addEventListener("animationend", () => {
          explosion.remove();
        });

      }, 5000);
    }

    const intervalo = setInterval(actualizarContador, 1000);
    actualizarContador();
  </script>
</body>
</html>
